<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="אבו אמין חלפים">
  <!--
    Abu Amin Halafim — Brand Mark v1
    Concept: The Hex Bolt Badge
    A flat-top hexagon (bolt head viewed from above) in Torque Yellow,
    with the Hebrew letter Aleph (א) — shared initial of Abu + Amin —
    in Industrial Black. The hex = tools/mechanics. The letter = brand identity.
    Colors: Torque Yellow #F5C300 + Industrial Black #0A0A0A
  -->
  <!-- Outer hexagon shadow/depth ring -->
  <polygon
    points="94,50 72,88.1 28,88.1 6,50 28,11.9 72,11.9"
    fill="#0A0A0A"
    transform="translate(1.5,2)"
    opacity="0.25"
  />
  <!-- Main hex — Torque Yellow -->
  <polygon
    points="94,50 72,88.1 28,88.1 6,50 28,11.9 72,11.9"
    fill="#F5C300"
  />
  <!-- Thin inner hex border for depth (industrial stamp feel) -->
  <polygon
    points="88,50 69,83.5 31,83.5 12,50 31,16.5 69,16.5"
    fill="none"
    stroke="#0A0A0A"
    stroke-width="1.5"
    opacity="0.12"
  />
  <!-- Aleph (א) — Hebrew initial of Abu + Amin, Heebo Black -->
  <text
    x="50"
    y="68"
    font-family="Heebo, 'Heebo Black', 'Arial Hebrew', 'David', sans-serif"
    font-size="46"
    font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
  >א</text>
</svg>
