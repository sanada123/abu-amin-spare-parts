<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img" aria-label="אבו אמין חלפים">
  <!--
    Abu Amin Halafim — Mono Black Lockup
    All black — for use on white/light backgrounds, print, embossing
  -->

  <!-- ——— MARK ——— -->
  <!-- Hex body — black -->
  <polygon
    points="94,50 72,88.1 28,88.1 6,50 28,11.9 72,11.9"
    fill="#0A0A0A"
  />
  <!-- Aleph — white cut-out -->
  <text
    x="50" y="68"
    font-family="Heebo, 'Arial Hebrew', sans-serif"
    font-size="46" font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
  >א</text>

  <!-- ——— WORDMARK ——— -->
  <text
    x="390" y="50"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="30" font-weight="900"
    fill="#0A0A0A"
    text-anchor="end"
    letter-spacing="-0.3"
  >אבו אמין חלפים</text>

  <!-- Tagline -->
  <text
    x="390" y="78"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="17" font-weight="700"
    fill="#0A0A0A"
    text-anchor="end"
    opacity="0.65"
  >מס׳ 1 בכרמל</text>
</svg>
