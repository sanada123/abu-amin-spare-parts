<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img" aria-label="אבו אמין חלפים — מס׳ 1 בכרמל">
  <!--
    Abu Amin Halafim — Horizontal Lockup v1
    Mark (left) + Wordmark (right)
    Background: transparent (use on dark backgrounds)
    Primary text: #F5F5F5  |  Tagline: Torque Yellow #F5C300
  -->

  <!-- ——— MARK (left) ——— -->
  <!-- Hex shadow -->
  <polygon
    points="94,50 72,88.1 28,88.1 6,50 28,11.9 72,11.9"
    fill="#000"
    transform="translate(1,2)"
    opacity="0.2"
  />
  <!-- Hex body -->
  <polygon
    points="94,50 72,88.1 28,88.1 6,50 28,11.9 72,11.9"
    fill="#F5C300"
  />
  <!-- Inner depth ring -->
  <polygon
    points="88,50 69,83.5 31,83.5 12,50 31,16.5 69,16.5"
    fill="none"
    stroke="#0A0A0A"
    stroke-width="1.5"
    opacity="0.12"
  />
  <!-- Aleph -->
  <text
    x="50" y="68"
    font-family="Heebo, 'Arial Hebrew', sans-serif"
    font-size="46" font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
  >א</text>

  <!-- ——— WORDMARK (right of mark) ——— -->
  <!-- Brand name: אבו אמין חלפים -->
  <text
    x="390" y="50"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="30" font-weight="900"
    fill="#F5F5F5"
    text-anchor="end"
    letter-spacing="-0.3"
  >אבו אמין חלפים</text>

  <!-- Tagline: מס׳ 1 בכרמל -->
  <text
    x="390" y="78"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="17" font-weight="700"
    fill="#F5C300"
    text-anchor="end"
    letter-spacing="0"
  >מס׳ 1 בכרמל</text>
</svg>
