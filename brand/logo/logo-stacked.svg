<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="אבו אמין חלפים — מס׳ 1 בכרמל">
  <!--
    Abu Amin Halafim — Stacked Lockup v1
    Mark (top center) + Wordmark (below) + Tagline (below)
    Transparent background — use on dark surfaces
  -->

  <!-- ——— MARK (centered top) ——— -->
  <!-- Hex shadow -->
  <polygon
    points="144,50 122,88.1 78,88.1 56,50 78,11.9 122,11.9"
    fill="#000"
    transform="translate(1,2)"
    opacity="0.2"
  />
  <!-- Hex body — centered at x=100 in 200-wide viewBox -->
  <polygon
    points="144,50 122,88.1 78,88.1 56,50 78,11.9 122,11.9"
    fill="#F5C300"
  />
  <!-- Inner ring -->
  <polygon
    points="138,50 119,83.5 81,83.5 62,50 81,16.5 119,16.5"
    fill="none"
    stroke="#0A0A0A"
    stroke-width="1.5"
    opacity="0.12"
  />
  <!-- Aleph centered at x=100 -->
  <text
    x="100" y="68"
    font-family="Heebo, 'Arial Hebrew', sans-serif"
    font-size="46" font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
  >א</text>

  <!-- ——— WORDMARK ——— -->
  <text
    x="100" y="130"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="24" font-weight="900"
    fill="#F5F5F5"
    text-anchor="middle"
    letter-spacing="-0.2"
  >אבו אמין חלפים</text>

  <!-- ——— TAGLINE ——— -->
  <text
    x="100" y="158"
    font-family="Heebo, 'Arial Hebrew', 'David', sans-serif"
    font-size="14" font-weight="700"
    fill="#F5C300"
    text-anchor="middle"
  >מס׳ 1 בכרמל</text>

  <!-- Thin divider line under tagline (industrial touch) -->
  <line x1="70" y1="170" x2="130" y2="170" stroke="#F5C300" stroke-width="1" opacity="0.4"/>

  <!-- Subtext: חלקי חילוף · כלים · גינה -->
  <text
    x="100" y="190"
    font-family="Heebo, 'Arial Hebrew', sans-serif"
    font-size="10" font-weight="400"
    fill="#A0A0A0"
    text-anchor="middle"
    letter-spacing="0.5"
  >חלקי חילוף · כלים · גינה</text>
</svg>
